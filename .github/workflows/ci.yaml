---
name: "CI"

on:
  push:
    branches:
      - "**"
  pull_request: ~

jobs:
  main:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

      - name: "Validate filenames"
        run: |
          python3 dev/validate-filenames.py
